name: CodeQL Java Analysis (JSON output)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      # 4. Build project (IMPORTANT: replace if needed)
      - name: Build project with Maven
        run: mvn -B clean install -DskipTests -Dspotless.skip=true

      # 5. Perform CodeQL analysis (save SARIF locally)
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: sarif-results

      # 6. Convert SARIF → JSON
      - name: Convert SARIF to JSON
        run: |
          mkdir -p out
          cp sarif-results/*.sarif out/results.sarif
          jq '.' out/results.sarif > out/results.json

      # 7. Upload artifact
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-java-results
          path: out/
